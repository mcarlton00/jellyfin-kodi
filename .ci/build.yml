parameters:
  python_versions : []

steps:
  - ${{ each py_version in parameters.py_versions }}:
    - task: usePythonVersion@0
      inputs:
        versionSpec: '3.6'

    - checkout: self
      clean: true

    - script: ls .
      displayName: 'home dir'

    - script: ls jellyfin-kodi
      displayName: 'git dir'

      #- script: export RELEASE_VERSION=$(grep 'version' jellyfin-kodi/release.yaml | awk '{print $2}' | tr -d \')
      #  displayName: ReleaseVersion

    - script: python3 -m pip install --user pyyaml
      displayName: 'Install PyYaml'

    - script: python3 jellyfin-kodi/.config/generate_xml.py ${{ py_version }}
      displayName: 'Create ${{ py_version }} addon.xml'

    - script: |
        export RELEASE_VERSION=$(grep 'version' jellyfin-kodi/release.yaml | awk '{print $2}' | tr -d \')
